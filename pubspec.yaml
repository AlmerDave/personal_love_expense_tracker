name: personal_love_expense_tracker
description: Personal Love Expense Tracker - Your friendly peso tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  
  # UI Components
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  shimmer: ^3.0.0
  
  # Date & Calendar
  table_calendar: ^3.0.9
  intl: ^0.19.0
  
  # Image Picker
  image_picker: ^1.0.7
  
  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0
  
  # Connectivity
  connectivity_plus: ^6.0.5
  
  # UUID
  uuid: ^4.3.3
  
  # Icons
  phosphor_flutter: ^2.0.1
  
  # Animations
  flutter_animate: ^4.5.0
  
  # URL Launcher (for PWA)
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/animations/